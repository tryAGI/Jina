site_name: Jina .NET Documentation
nav:
- Overview: index.md
- Guides:
  - Microsoft.Extensions.AI: guides/meai.md
# EXAMPLES:START
- Examples:
  - Create Embedding: examples/create-embedding.md
  - Embedding Generator Batch Texts: examples/embedding-generator-batch-texts.md
  - Embedding Generator Custom Dimensions: examples/embedding-generator-custom-dimensions.md
  - Embedding Generator Get Service Returns Metadata: examples/embedding-generator-get-service-returns-metadata.md
  - Embedding Generator Get Service Returns Null For Unknown Key: examples/embedding-generator-get-service-returns-null-for-unknown-key.md
  - Embedding Generator Get Service Returns Self: examples/embedding-generator-get-service-returns-self.md
  - Embedding Generator Single Text: examples/embedding-generator-single-text.md
  - Multimodal Embeddings Mixed Text And Image: examples/multimodal-embeddings-mixed-text-and-image.md
  - Multimodal Embeddings Single Image: examples/multimodal-embeddings-single-image.md
  - Rerank: examples/rerank.md
# EXAMPLES:END
        
theme:
  name: material
  static_templates:
    - 404.html
  language: 'en'
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  include_search_page: false
  search_index_only: true
  favicon: 'media/icon128.png'
  icon:
    logo: 'material/file-document'
  features:
    - content.action.edit
    - navigation.instant
  font:
    text: 'Fira Sans'
    code: 'Fira Mono'

extra:
  version:
    provider: mike

extra_css:
  - 'css/extra.css?v=14'

markdown_extensions:
  - admonition
  - def_list
  - footnotes
  - meta
  - toc:
      permalink: ""
      slugify: !!python/name:pymdownx.slugs.uslugify
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.progressbar
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: math
          class: arithmatex
          format: !!python/name:pymdownx.arithmatex.fence_mathjax_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true